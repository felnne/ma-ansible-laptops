- name: Create file on Windows desktop
  hosts: Laptops
  gather_facts: no
  tasks:
    - name: Ensure Desktop directory exists
      ansible.windows.win_file:
        path: "C:\\Users\\{{ ansible_user }}\\Desktop"
        state: directory

    - name: Create file from a template
      ansible.windows.win_template:
        src: hello.txt.j2
        dest: "C:\\Users\\{{ ansible_user }}\\Desktop\\hello.txt"
